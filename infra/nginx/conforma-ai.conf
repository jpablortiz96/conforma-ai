# Replace `server_name` with either:
#   - <your-vultr-ip>.nip.io
#   - api.yourdomain.com
#
# This server block assumes the API container is published only on 127.0.0.1:8000
# from docker-compose.prod.yml. Add your TLS/certbot server block separately.

server {
    listen 80;
    server_name <server-ip>.nip.io api.yourdomain.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Required for long-running SSE audit streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;

        # FastAPI already handles CORS, but these headers help when diagnosing
        # reverse-proxy behavior from browser preflight traces.
        add_header X-Accel-Buffering no always;
        add_header Cache-Control "no-cache" always;
    }
}
